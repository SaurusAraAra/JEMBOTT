<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SVG Exporter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    font-family: 'Segoe UI', sans-serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #a0c4ff;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  p.sub {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 20px;
  }

  textarea {
    width: 100%;
    max-width: 640px;
    height: 200px;
    background: #111118;
    border: 1.5px solid #222;
    border-radius: 10px;
    color: #ccc;
    font-family: monospace;
    font-size: 0.78rem;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border 0.2s;
  }
  textarea:focus { border-color: #4fc3f7; }

  .row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    width: 100%;
    max-width: 640px;
    align-items: center;
    flex-wrap: wrap;
  }

  label {
    font-size: 0.78rem;
    color: #666;
    white-space: nowrap;
  }

  select, input[type=number] {
    background: #111118;
    border: 1.5px solid #222;
    border-radius: 7px;
    color: #ccc;
    padding: 7px 10px;
    font-size: 0.8rem;
    outline: none;
  }

  input[type=number] { width: 80px; }

  .btn {
    margin-top: 16px;
    width: 100%;
    max-width: 640px;
    padding: 13px;
    background: linear-gradient(135deg, #1a5276, #154360);
    border: 1.5px solid #4fc3f7;
    border-radius: 10px;
    color: #a8daff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: linear-gradient(135deg, #21618c, #1a5276); }
  .btn:active { transform: scale(0.98); }

  #preview-wrap {
    margin-top: 24px;
    width: 100%;
    max-width: 640px;
    background: repeating-conic-gradient(#1a1a1a 0% 25%, #111 0% 50%) 0 0 / 20px 20px;
    border-radius: 12px;
    border: 1px solid #222;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 120px;
  }

  #preview-wrap img {
    max-width: 100%;
    max-height: 400px;
    border-radius: 8px;
  }

  #msg {
    margin-top: 12px;
    font-size: 0.8rem;
    color: #4fc3f7;
    min-height: 18px;
  }
</style>
</head>
<body>

<h1>⭐ SVG → PNG Exporter</h1>
<p class="sub">Paste kode SVG, atur ukuran, klik Download — background otomatis ngikutin SVG (transparan / tidak)</p>

<textarea id="svgInput" placeholder='Paste kode SVG di sini... (contoh: <svg xmlns="..." viewBox="...">...</svg>)'></textarea>

<div class="row">
  <label>Skala resolusi:</label>
  <select id="scale">
    <option value="2">2x (HD)</option>
    <option value="3" selected>3x (Full HD)</option>
    <option value="4">4x (Ultra HD)</option>
    <option value="6">6x (4K-ish)</option>
  </select>

  <label style="margin-left:10px">Nama file:</label>
  <input type="text" id="filename" value="epai-logo" style="background:#111118;border:1.5px solid #222;border-radius:7px;color:#ccc;padding:7px 10px;font-size:0.8rem;outline:none;width:130px"/>
</div>

<button class="btn" onclick="exportPNG()">⬇ Download PNG</button>

<div id="preview-wrap">
  <img id="preview" src="" alt="preview"/>
</div>

<div id="msg"></div>

<script>
function exportPNG() {
  const svgText = document.getElementById('svgInput').value.trim();
  const scale = parseInt(document.getElementById('scale').value);
  const filename = document.getElementById('filename').value.trim() || 'logo';
  const msg = document.getElementById('msg');

  if (!svgText) {
    msg.textContent = '⚠ Paste dulu kode SVG-nya!';
    return;
  }

  // Parse SVG
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgText, 'image/svg+xml');
  const svgEl = doc.querySelector('svg');

  if (!svgEl) {
    msg.textContent = '⚠ SVG tidak valid!';
    return;
  }

  // Get dimensions
  let w = parseFloat(svgEl.getAttribute('width'));
  let h = parseFloat(svgEl.getAttribute('height'));

  if (!w || !h) {
    const vb = svgEl.getAttribute('viewBox');
    if (vb) {
      const parts = vb.trim().split(/[\s,]+/);
      w = parseFloat(parts[2]);
      h = parseFloat(parts[3]);
    }
  }

  if (!w || !h) { w = 500; h = 500; }

  const canvasW = w * scale;
  const canvasH = h * scale;

  // Force SVG size
  svgEl.setAttribute('width', w);
  svgEl.setAttribute('height', h);

  // Check if SVG has transparent background
  // (no explicit background rect / fill on root)
  const hasBackground = checkHasBackground(svgEl);

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svgEl);
  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = canvasW;
    canvas.height = canvasH;
    const ctx = canvas.getContext('2d');

    // Only fill white if SVG has a background, else keep transparent
    if (hasBackground) {
      // draw as-is (background already in SVG)
    }
    // Always transparent canvas — let SVG decide

    ctx.drawImage(img, 0, 0, canvasW, canvasH);
    URL.revokeObjectURL(url);

    // Show preview
    const previewWrap = document.getElementById('preview-wrap');
    const preview = document.getElementById('preview');
    canvas.toBlob(blob2 => {
      const purl = URL.createObjectURL(blob2);
      preview.src = purl;
      previewWrap.style.display = 'flex';
    }, 'image/png');

    // Download
    const a = document.createElement('a');
    a.download = filename + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();

    msg.textContent = `✅ Berhasil! Ukuran: ${canvasW}×${canvasH}px`;
  };

  img.onerror = function() {
    msg.textContent = '⚠ Gagal render SVG. Cek kode SVG-nya.';
    URL.revokeObjectURL(url);
  };

  img.src = url;
  msg.textContent = 'Memproses...';
}

function checkHasBackground(svgEl) {
  // Check if root SVG has a style/fill background
  const style = svgEl.getAttribute('style') || '';
  const fill = svgEl.getAttribute('fill') || '';
  if (style.includes('background') || fill) return true;

  // Check first-child rect that covers full area
  const firstChild = svgEl.children[0];
  if (firstChild && firstChild.tagName === 'rect') {
    const rx = firstChild.getAttribute('x') || '0';
    const ry = firstChild.getAttribute('y') || '0';
    if (rx === '0' && ry === '0') return true;
  }
  return false;
}
</script>
</body>
</html>
